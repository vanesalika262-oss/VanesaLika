<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanesa Lika | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fffdf5; /* Ngjyra qumësht (Milk) */
            --text-dark: #1a1a1a; /* E zezë për tekstin që të lexohet */
            --accent: #d4a373; /* E artë/bronx për detajet */
            --border-dark: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            scroll-behavior: smooth;
            line-height: 1.6;
        }

        /* --- MENUJA (E zezë me shkronja të bardha) --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 30px;
            display: flex;
            gap: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: 0.3s;
            font-weight: 500;
        }

        nav a:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* --- PJESA E SIPËRME (Emri dhe Korniza) --- */
        header {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-frame {
            position: relative;
            padding: 80px 60px;
            text-align: center;
            border: 1px solid var(--border-dark);
            background: rgba(255, 255, 255, 0.3);
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
        }
        .top-left {
            top: -2px; left: -2px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
        }
        .bottom-right {
            bottom: -2px; right: -2px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            color: var(--text-dark);
            animation: tracking-expand 1.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        .sub-title {
            letter-spacing: 7px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-top: 20px;
            color: var(--accent);
        }

        @keyframes tracking-expand {
            0% { letter-spacing: -0.5em; opacity: 0; }
            40% { opacity: 0.6; }
            100% { opacity: 1; letter-spacing: 15px; }
        }

            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px
