<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanesa Lika | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Konfigurimi i ngjyrave për stilin 'Milk' */
            --bg: #fffdf5; 
            --text-dark: #1a1a1a;
            --accent: #d4a373;
            --border-dark: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            scroll-behavior: smooth;
            line-height: 1.6;
        }

        /* NAVIGATION - E zezë për kontrast të fortë */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 30px;
            display: flex;
            gap: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        nav a {
            color: white !important; /* Shkronjat e menusë gjithmonë të bardha */
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        nav a:hover { opacity: 1; color: var(--accent) !important; }

        /* HERO SECTION */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 200;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
            color: var(--text-dark) !important;
        }

        header p {
            opacity: 0.6;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--accent) !important;
        }

        /* GALLERY */
        .gallery {
            padding: 100px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .art-card {
            background: white;
            border: 1px solid var(--border-dark);
            border-radius: 15px;
            padding: 15px;
            transition: 0.5s;
        }

        .art-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .art-card h3 { margin-top: 15px; color: var(--text-dark); }
        .art-card p { opacity: 0.6; color: var(--text-dark); }

        .art-card img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* ABOUT SECTION */
        .about {
            padding: 100px 10%;
            background: rgba(0,0,0,0.02);
        }

        .bio-flex {
            display: flex;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .bio-img {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .bio-text { flex: 1; min-width: 300px; }
